<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>CHIKKA</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css" />

    <!-- FIREBASE -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

      import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

      import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "YOUR_API_KEY",

        authDomain: "YOUR_AUTH_DOMAIN",

        projectId: "YOUR_PROJECT_ID",

        storageBucket: "YOUR_STORAGE_BUCKET",

        messagingSenderId: "YOUR_MESSAGING_ID",

        appId: "YOUR_APP_ID",
      };

      const app = initializeApp(firebaseConfig);

      window.db = getFirestore(app);

      window.auth = getAuth(app);
    </script>
  </head>

  <body>
    <!-- HEADER -->
    <header class="topbar">
      <div class="logo">CHIKKA</div>

      <nav>
        <a href="#rankingSection"> 랭킹 </a>

        <a href="#hallSection"> 당구장 </a>

        <a href="#tournamentSection"> 토너먼트 </a>

        <a href="#mypageSection"> 마이페이지 </a>
      </nav>
    </header>

    <!-- MAIN -->
    <main class="container">
      <div id="login-container"></div>

      <div id="ranking-container"></div>

      <div id="hall-container"></div>

      <div id="tournament-container"></div>

      <div id="mypage-container"></div>

      <div id="admin-container"></div>
    </main>

    <!-- INCLUDE -->
    <script type="module" src="js/include.js"></script>

    <script type="module" src="js/login.js"></script>

    <script type="module" src="js/script.js"></script>

    <script type="module" src="js/hall.js"></script>

    <script type="module" src="js/tournament.js"></script>

    <script type="module" src="js/mypage.js"></script>
  </body>
</html>
