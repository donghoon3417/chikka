<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>CHIKKA</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css" />

    <!-- FIREBASE -->
    <script type="module">
      import { firebaseConfig } from "./firebase-config.js";

      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

      import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

      import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

      const app = initializeApp(firebaseConfig);

      window.db = getFirestore(app);

      window.auth = getAuth(app);

      console.log("firebase init 완료");
    </script>
  </head>

  <body>
    <!-- HEADER -->
    <div class="topbar-wrap">
      <header class="topbar">
        <div class="logo">CHIKKA</div>

        <nav>
          <a href="#rankingSection"> 랭킹 </a>

          <a href="#hallSection"> 당구장 </a>

          <a href="#tournamentSection"> 토너먼트 </a>
        </nav>

        <div id="login-container"></div>
      </header>
    </div>

    <!-- MAIN -->
    <main class="container">
      <div id="ranking-container"></div>

      <div id="hall-container"></div>

      <div id="tournament-container"></div>

      <div id="admin-container"></div>
    </main>

    <!-- OVERLAY -->
    <div id="signupOverlay"></div>

    <!-- MY PAGE MODAL -->
    <div id="mypageModal">
      <iframe id="mypageFrame" src=""></iframe>
    </div>

    <!-- INCLUDE -->
    <script type="module" src="js/include.js"></script>
  </body>
</html>
