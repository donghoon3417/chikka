<section class="card">
  <!-- LOGIN -->
  <div id="loginPage">
    <div class="auth-row">
      <input id="id" placeholder="아이디" />

      <input id="pw" type="password" placeholder="비밀번호" />
    </div>

    <div class="button-row">
      <button id="authBtn" onclick="login()">로그인</button>

      <button id="signupBtn" onclick="location.href = 'pages/signup.html'">
        회원가입
      </button>

      <button
        id="mypageBtn"
        onclick="location.href = 'pages/mypage.html'"
        style="display: none"
      >
        마이페이지
      </button>

      <button
        class="danger-btn"
        onclick="deleteMyAccount()"
        style="display: none"
      >
        회원탈퇴
      </button>
    </div>
  </div>
</section>

</div>
