<section
  id="mypageSection"
  class="card"
  style="display:none;"
>

  <h2>
    마이페이지
  </h2>

  <div class="grid-form">

    <input
      id="m_id"
      disabled
      placeholder="아이디"
    />

    <input
      id="m_displayName"
      placeholder="닉네임"
    />

    <input
      id="m_score4"
      placeholder="4구 점수"
    />

    <input
      id="m_score3"
      placeholder="3구 점수"
    />

    <input
      id="m_hr4"
      placeholder="4구 하이런"
    />

    <input
      id="m_hr3"
      placeholder="3구 하이런"
    />

    <input
      id="m_place"
      placeholder="당구장"
    />

  </div>

  <div class="button-row">

    <button onclick="updateMyInfo()">
      수정 저장
    </button>

    <button onclick="closeMyPage()">
      닫기
    </button>

  </div>

</section>
