<section id="rankingSection">

  <!-- TOP -->
  <div class="ranking-top-row">

    <!-- LEFT -->
    <div class="ranking-type-buttons">

      <button
        id="rank4Btn"
        class="active"
        onclick="loadRanking('4ball', 'weekly')"
      >
        4구
      </button>

      <button
        id="rank3Btn"
        onclick="loadRanking('3ball', 'weekly')"
      >
        3구
      </button>

    </div>

    <!-- RIGHT -->
    <div class="ranking-period-buttons">

      <button
        id="weeklyBtn"
        class="active"
        onclick="changePeriod('weekly')"
      >
        주간
      </button>

      <button
        id="monthlyBtn"
        onclick="changePeriod('monthly')"
      >
        월간
      </button>

      <button
        id="yearlyBtn"
        onclick="changePeriod('yearly')"

  </div>
